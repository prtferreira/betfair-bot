spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:betfair_dev_password}

# Live odds snapshot persistence cadence.
betfair.live-odds.persist-interval-seconds=30
betfair.live-odds.persist-interval-ms=30000

# Statpal live endpoint cache (to reduce external API calls).
statpal.live.cache-ttl-seconds=30
